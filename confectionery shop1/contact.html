<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="container me-0">
          <ul class="nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="whatsnew.html">What's new</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact us</a>
            </li>
          </ul>
        </div>
      </nav>
      <div class="container d-flex ms-auto me-0 justify-content-end expand-sm">
        <button id="togglebtn" class="btn btn-info">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
      <div class="cart_box" id="cart_box1">
        <header>
          <div class="title">Card</div>
          <div class="icon_cart">
            <svg
              class="w-6 h-6 text-gray-800 dark:text-white"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="40"
              height="40"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312"
              />
            </svg>
            <span>0</span>
          </div>
        </header>
        <div class="btn">
          <div class="amt">$0.00</div>
          <button class="closebtn">CLOSE</button>
        </div>
      </div>
    </header>
    <main>
      <section>
        <div id="alert">
          <p>Form submitted sucessfully</p>
          <button class="btn btn-primary btn-sm" id="close1" onclick="closeAlertt()">CLOSE</button>
        </div>
        <div class="contact1 d-flex">
          <div class="loc">
            <h1>Location</h1>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31093.67850192877!2d80.18597417431639!3d13.054134100000011!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a52675ba4735161%3A0xf0237236523a9c72!2sChaicup%20%E2%80%94%20Kodambakkam!5e0!3m2!1sen!2sin!4v1770805004739!5m2!1sen!2sin"
              width="400"
              height="600"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
          <div class="form1">
            <h1>Contact Us</h1>
            <form id="myForm">
              <div class="form-group row">
                <label for="inputname1">Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="exampleinputname1"
                  placeholder="Enter name" required
                />
              </div>
              <div class="form-group row">
                <label for="inputemail1">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="exampleinputemail1"
                  placeholder="Enter email" required
                />
              </div>
              <div class="form-group row">
                <label for="message1">Message</label>
                <textarea
                  class="form-control"
                  id="examplemessage1"
                  rows="5"
                ></textarea>
              </div>
              <div class="text-center">
                <button type="button" id="formButton" onclick="validateForm()" class="btn btn-primary btn-lg">
                  Submit
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
     <script src="script.js" defer></script>
  </body>
</html>
